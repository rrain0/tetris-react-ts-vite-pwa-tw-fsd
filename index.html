<!doctype html>
<html lang='%APP_LANG%'>
  <head>
    <meta charset='UTF-8'/>
    
    <meta name='viewport'
      content='
        width=device-width, height=device-height,
        viewport-fit=cover, shrink-to-fit=no,
        interactive-widget=resizes-content,
        initial-scale=1'
    />
    
    <link rel='icon' href='/static/assets/tetris-favicon.png'/>
    <link rel="stylesheet" type="text/css" href='/static/styles/app.css'/>
    
    <title>%APP_NAME%</title>
    <meta name='description' content='%APP_DESCRIPTION%'/>
    
    
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop.
      See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <!--<link rel='manifest' href='/manifest.json%MANIFEST_SEARCH_PARAMS%'>-->
    
    <!-- for iOS (svg is not supported) -->
    <link rel='icon' type='image/png' href='/static/assets/tetris-favicon-64.png'/>
    <!-- PWA launcher icon for iOS -->
    <link rel='apple-touch-icon' type='image/png' href='/static/assets/tetris-favicon-192-padding.png'/>
    
    <!-- Used as color of mobile browser toolbar in site mode -->
    <!-- Do not set it if use media='(prefers-color-scheme: ...)' -->
    <meta name='theme-color' content='#0b181f'/>
    
    
    
    <!-- Add global envs -->
    <script>
      /** @type {'development' | 'production' | string} */
      const envBuildMode = '%MODE%'
      /** @type {string} */
      // Base url have '/' at the end
      const envBaseUrl = '%BASE_URL%'
    </script>
    
    <script type='application/javascript' src='/static/scripts/syncHtml.js'></script>
    
  </head>
  <body>
    
    <div id='root' style='display: contents;'></div>
    <div id='modal-outlet' style='display: contents;'></div>
    <script type='module' src='/src/main.tsx'></script>
  
  </body>
</html>
