
#user  nobody;
worker_processes  auto;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
  worker_connections  1024;
}


http {
  include       mime.types;
  default_type  application/octet-stream;

# log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
#                   '$status $body_bytes_sent "$http_referer" '
#                   '"$http_user_agent" "$http_x_forwarded_for"';

# access_log  logs/access.log  main;

  sendfile        on;
# tcp_nopush     on;

# keepalive_timeout  0;
  keepalive_timeout  65;

  client_max_body_size 16M;

# gzip  on;

# error_page  404              /404.html;

# # redirect server error pages to the static page /50x.html
#
#  error_page   500 502 503 504  /50x.html;
#  location = /50x.html {
#    root   html;
#  }



  # proxy to react
  # https://${PROXY_HOST}:${PROXY_PORT} => react server http://localhost:${REACT_PORT}
  server {
    server_name  ${PROXY_HOST};
    listen       ${PROXY_PORT} ssl;

    ssl_certificate      "/etc/ssl/cert/cert.crt";
    ssl_certificate_key  "/etc/ssl/cert/cert.key";

    ssl_session_cache    shared:SSL:1m;
    ssl_session_timeout  5m;

    ssl_ciphers  HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers  on;

    location / {
      proxy_pass http://localhost:${REACT_PORT}/;

      # WebSocket support
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $http_connection;
      proxy_set_header Host $host;
    }
  }

}
